<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>GeoLearn – Játékok</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="center-page">
    <div class="container">
      <h1>🎮 Játékok</h1>
      <p class="subtitle">Válassz egy játékot!</p>

      <div class="menu">
        <div class="card" onclick="location.href='puzzle.html'">
          <div class="icon">
            <img src="/icons/puzzle.png" alt="Puzzle ikon" class="menuIcon">
          </div>
          <h2>Zászló Puzzle</h2>
          <p>Rakd ki a zászlót 3×3-ban!</p>
        </div>
        <div class="card" onclick="location.href='memory.html'">
          <div class="icon">
            <img src="/icons/memory.png" alt="Memory ikon" class="menuIcon">
          </div>
          <h2>Pexeso</h2>
          <p>Párosítsd a fővárosokat az országukkal!</p>
        </div>
        <div class="card" onclick="location.href='map_select.html'">
          <div class="icon">
            <img src="/icons/map.png" alt="Vaktérkép ikon" class="menuIcon">
          </div>
          <h2>Vaktérkép</h2>
          <p>Keresd meg az országokat a térképen!</p>
        </div>
      </div>

      <div class="bottom-back">
        <button onclick="location.href='../index.html'">← Vissza a főmenübe</button>
      </div>
    </div>
  </div>
</body>
</html>
